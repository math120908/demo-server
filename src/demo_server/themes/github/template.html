<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title }}</title>
  <style>
    /* GitHub-style Markdown Theme */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
      font-size: 16px;
      line-height: 1.5;
      color: #1f2328;
      background: #ffffff;
      -webkit-font-smoothing: antialiased;
    }
    .md-container {
      max-width: 860px;
      margin: 0 auto;
      padding: 3rem 2rem 4rem;
    }
    @media (max-width: 640px) {
      .md-container { padding: 2rem 1rem 3rem; }
    }

    h1, h2, h3, h4, h5, h6 {
      margin-top: 1.5em;
      margin-bottom: 0.5em;
      font-weight: 600;
      line-height: 1.25;
    }
    h1 { font-size: 2em; margin-top: 0; padding-bottom: 0.3em; border-bottom: 1px solid #d1d9e0; }
    h2 { font-size: 1.5em; padding-bottom: 0.3em; border-bottom: 1px solid #d1d9e0; }
    h3 { font-size: 1.25em; }
    h4 { font-size: 1em; }

    p { margin-bottom: 1em; }
    a { color: #0969da; text-decoration: none; }
    a:hover { text-decoration: underline; }
    hr { border: none; border-top: 1px solid #d1d9e0; margin: 1.5em 0; }

    ul, ol { margin-bottom: 1em; padding-left: 2em; }
    li { margin-bottom: 0.25em; }
    li > ul, li > ol { margin-top: 0.25em; margin-bottom: 0; }
    li input[type="checkbox"] { margin-right: 0.35em; }

    blockquote {
      border-left: 4px solid #d1d9e0;
      padding: 0 1em;
      margin: 1em 0;
      color: #656d76;
    }
    blockquote p:last-child { margin-bottom: 0; }

    code {
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
      font-size: 0.85em;
      background: #eff1f3;
      padding: 0.2em 0.4em;
      border-radius: 6px;
    }
    pre {
      background: #f6f8fa;
      border: 1px solid #d1d9e0;
      border-radius: 6px;
      padding: 1rem;
      overflow-x: auto;
      margin: 1em 0;
      line-height: 1.45;
    }
    pre code {
      background: none;
      padding: 0;
      font-size: 0.85em;
    }

    {{ highlight_css }}

    table {
      width: 100%;
      border-collapse: collapse;
      margin: 1em 0;
    }
    th, td {
      padding: 6px 13px;
      border: 1px solid #d1d9e0;
    }
    th { font-weight: 600; background: #f6f8fa; }
    tr:nth-child(even) { background: #f6f8fa; }

    img { max-width: 100%; height: auto; }

    .md-card {
      background: linear-gradient(135deg, var(--card-bg, #eff6ff) 0%, var(--card-bg2, #dbeafe) 100%);
      border: 1px solid var(--card-border, #2563eb);
      border-radius: 8px; padding: 24px 28px; margin: 1em 0; position: relative;
    }
    .md-card .card-label {
      position: absolute; top: -12px; left: 24px;
      background: var(--card-badge-bg, #2563eb); color: var(--card-badge-text, #fff);
      padding: 4px 12px; border-radius: 999px; font-size: 11px;
      font-family: ui-monospace, monospace; letter-spacing: 0.08em; font-weight: 600;
    }
    .md-card .card-label:not(:empty) + * { margin-top: 8px; }
    .md-card h2, .md-card h3 { color: var(--card-text, #1e40af); border: none; padding: 0; }
    .md-callout {
      background: #fff; border: 1px dashed var(--card-border, #d1d9e0);
      border-radius: 6px; padding: 14px 18px; margin: 1em 0; font-size: 14px;
    }
    .md-callout > *:first-child { margin-top: 0; }
    .md-callout > *:last-child { margin-bottom: 0; }
    .md-callout strong { color: var(--card-text, #0969da); }

    details { margin: 1em 0; }
    summary { cursor: pointer; font-weight: 600; }
    details.fold-block {
      border: 1px solid #d1d9e0; border-radius: 6px;
      padding: 0; overflow: hidden;
    }
    details.fold-block summary {
      padding: 8px 16px; color: #0969da;
      list-style: none;
    }
    details.fold-block summary::-webkit-details-marker { display: none; }
    details.fold-block summary::before { content: "▶ "; font-size: 0.75em; }
    details.fold-block[open] summary::before { content: "▼ "; }
    details.fold-block[open] summary {
      background: #f6f8fa; border-bottom: 1px solid #d1d9e0;
    }
    details.fold-block > *:not(summary) { padding: 0 16px; }
    details.fold-block > p:last-child { padding-bottom: 10px; }
  </style>
</head>
<body>
  <div class="md-container">
    {{ content }}
  </div>
</body>
</html>
